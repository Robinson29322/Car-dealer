<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<style>

body{
    margin: 0;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0.938), rgb(78, 78, 78));
    background-attachment: fixed;}

html{scroll-behavior: smooth;}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveBg 60s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-500px,-500px); }
}


.btn:hover{
  transform: translateY(-3px);
  transition: 0.3s ease;
}

h1,h2,h3, h4, h5, p{cursor:default;}



</style>

</head>
<body>
    
                    <!-- Header -->

<header class="d-flex justify-content-between align-items-center px-5" style="height: 7rem; background: black; backdrop-filter: blur(6px);">

  
  <h4 class="m-0 fw-bold fs-2 text-light" id="Brand-name">Car-e Port</h4>

  <img src="Car-e Port Logo.jpg" alt="" 
       style="height: 120px; width: 150px;"
       class="rounded-circle">

  <ul class="nav align-items-center">
    <li class="nav-item">
      <a class="nav-link text-light" href="About.html">About</a>
    </li>
    <li class="nav-item">
      <a href="Login.html">
      <button class="btn btn-warning ms-2">Login</button>
      </a>
    </li>
  </ul>
</header>

<main>
<section>
<Form>

        <a href="../Home pg/Home.html"
        class="btn btn-outline-light position-fixed d-flex align-items-center justify-content-center"
        style="top: 20em; right: 2em; border-radius: 30px; height: 25px; width: 10px;">
        ←</a>

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card-shadow p-4 text-light w-100" 
             style="max-width: 400px; background-color: rgba(245, 245, 245, 0.301); 
             box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 10px rgba(255, 255, 255, 0.05);">
            <h2 class="text-center fs-2 mb-2">Login</h2>
            <p class="text-center fs-4 mb-4">Welcome Back</p>
            <div class="mb-3">
                <label for="user id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user id" placeholder="Enter your user iD">
            </div>
            <div class="mb-3">
                <label for="password" class="form label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password">
            </div>
            <div class="mb-3 form-check">
                <input class="form-check-input" type="checkbox" id="showPassword" onclick="togglePassword()">
                <label class="form-check-label" for="showPassword">Show Password</label>
            </div>
            <button class="btn btn-primary w-100 mb-3">Submit</button>
            <p class="text-center mb-2"> Not a member ? No Worries</p>
            <button class="btn btn-success w-100">Sign Up</button>
        </div>
    </div>
</Form>
</section>
</main>

<script>
function togglePassword(){
    const passwordInput = document.getElementById("password");
    const checkbox = document.getElementById("showPassword");

    if(checkbox.checked){
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>

</body>
</html>
