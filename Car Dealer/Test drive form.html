<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test drive form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<style>
body{
 margin: 0;
 background: linear-gradient(to bottom, rgba(0, 0, 0, 0.938), rgb(78, 78, 78));
 background-attachment: fixed;
}
html{scroll-behavior: smooth;}

body::before {
 content: ""; 
 position: fixed;
 width: 200%;
 height: 200%;
 background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
 background-size: 50px 50px;
 animation: moveBg 60s linear infinite;
 z-index: -1;
}

@keyframes moveBg {
 from { transform: translate(0,0); }
 to { transform: translate(-500px,-500px); }
}

.btn:hover{
 transform: translateY(-3px);
 transition: 0.3s ease;
}

h1,h2,h3,h4,h5,p{cursor:default;}

</style>
</head>

<body>

<!-- Header -->
<header class="d-flex justify-content-between align-items-center px-5"
style="height: 7rem; background: black; backdrop-filter: blur(6px);">
<h4 class="m-0 fw-bold fs-2 text-light">Car-e Port</h4>
<img src="Car-e Port Logo.jpg" style="height: 120px; width: 150px;" class="rounded-circle">

<ul class="nav align-items-center">
<li class="nav-item">
<a class="nav-link text-light" href="About.html">About</a>
</li>
<li class="nav-item">
<a href="Login.html">
<button class="btn btn-warning ms-2">Login</button>
</a>
</li>
</ul>
</header>

                    <!-- Main -->
 
<main>

<!-- Form -->

<div class="card-body">

        <a href="Index.html#Getme"
        class="btn btn-outline-light position-fixed d-flex align-items-center justify-content-center"
        style="opacity: 75%; top: 23em; right: 2em; border-radius: 30px; height: 25px; width: 10px;">
        ←</a>

<div id="errorMsg" style="color:red; text-align:center; margin-top:10px;"></div>

<Form id="myForm">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card-shadow p-4 text-light w-100" 
             style="max-width: 400px; background-color: rgba(245, 245, 245, 0.301); 
             box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 10px rgba(255, 255, 255, 0.05);">

<h3 class="text-center mt-5">Test drive form</h3>

<div class="mt-5 d-flex justify-content-center">
  <select id="brand" class="form-control" required>
    <option value="">Select Brand</option>
    <option value="TOYOTA">TOYOTA</option>
    <option value="MAHINDRA">MAHINDRA</option>
    <option value="HYUNDAI">HYUNDAI</option>
    <option value="TATA">TATA</option>
    <option value="SUZUKI">SUZUKI</option>
    <option value="RENAULT">RENAULT</option>
  </select>
</div>

<div class="mt-3 d-flex justify-content-center">
  <select id="model" class="form-control" required>
    <option value="">Select Model</option>
  </select>
</div>


<div class="mt-4 d-flex justify-content-center">
<input type="text" class="form-control" placeholder="Name" required>
</div>

<div class="mt-3 d-flex justify-content-center">
<input type="date" class="form-control" required>
</div>

<div class="mt-3 d-flex justify-content-center">
<input type="text" class="form-control" placeholder="Occupation" required>
</div>

<div class="mt-3 d-flex justify-content-center">
<input type="number" class="form-control" placeholder="Annual Income" required>
</div>

<div class="mt-3 d-flex justify-content-center">
<input type="email" class="form-control" placeholder="Email" required>
</div>

<div class="mt-3 d-flex justify-content-center">
<input type="tel" class="form-control" placeholder="Phone Number" required>
</div>

<div class="mt-3 d-flex justify-content-center">
<textarea rows="3" class="form-control" placeholder="Address" required></textarea>
</div>

<div class="mt-4 text-center">
<button type="submit" class="btn btn-primary w-50">Submit</button>
</div>
        </div>
    </div>
</Form>

</div>

</div>
</div>
</main>


<script>
document.getElementById("myForm").addEventListener("submit", function(event) {
event.preventDefault();

let inputs = this.querySelectorAll("input, textarea");
let errorMsg = document.getElementById("errorMsg");
errorMsg.innerText = "";

for (let input of inputs) {
 if (input.value.trim() === "") {
  errorMsg.innerText = "This field is required";
  input.focus();
  return;
 }
}

alert("Form submitted successfully!");
this.submit();
});
</script>



            <!-- Brand and Model  -->


<script>
  const brandSelect = document.getElementById("brand");
  const modelSelect = document.getElementById("model");

  const models = {
    TOYOTA: ["Fortuner 2025", "Hyryder", "Innova Crysta", "Fortuner 2023"],
    MAHINDRA: ["Thar", "Scorpio", "XUV700", "Bolero"],
    HYUNDAI: ["Exter", "Alcazar", "Venue", "Creta"],
    TATA: ["Punch", "Curvv", "Safari", "Sierra"],
    SUZUKI: ["Ertiga", "Victoris", "Vitara", "Brezza"],
    RENAULT: ["Duster", "Boreal", "Kwid", "Kiger"]
  };

  brandSelect.addEventListener("change", function () {
    const selectedBrand = this.value;

    // clear previous models
    modelSelect.innerHTML = '<option value="">Select Model</option>';

    if (models[selectedBrand]) {
      models[selectedBrand].forEach(function (car) {
        const option = document.createElement("option");
        option.value = car;
        option.textContent = car;
        modelSelect.appendChild(option);
      });
    }
  });
</script>

</body>
</html>
